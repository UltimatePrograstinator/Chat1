<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupaChat</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="auth-screen" class="screen hidden">
        <div class="auth-box">
            <h1>👋 Welcome to SupaChat</h1>
            <p>Choose a unique username to get started.</p>
            <div class="input-row">
                <input type="text" id="username-input" placeholder="Enter username..." maxlength="15">
                <button onclick="registerUsername()">Join</button>
            </div>
            <p id="auth-error" class="error-text"></p>
        </div>
    </div>

    <div id="app-screen" class="app-layout screen hidden">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>SupaChat</h3>
                <span id="display-my-username"></span>
            </div>
            <div class="sidebar-content">
                <h4>Create Group</h4>
                <input type="text" id="new-room-name" placeholder="Group Name...">
                <button class="btn-block" onclick="createNewGroup()">+ New Group</button>
                <p id="group-error" class="error-text"></p>
            </div>
        </aside>

        <main class="main-content">
            
            <div id="home-view" class="view-panel">
                <h2>Your Group Chats</h2>
                <p class="subtitle">Select a conversation or create a new one to begin.</p>
                <ul id="rooms-list" class="rooms-grid">
                    </ul>
            </div>

            <div id="chat-view" class="view-panel hidden">
                <header class="chat-header">
                    <div class="chat-meta">
                        <button class="back-btn" onclick="showHomeView()">← Back</button>
                        <h2 id="active-room-header"># Group Name</h2>
                    </div>
                    <div class="add-user-area">
                        <input type="text" id="invite-username" placeholder="Friend's username...">
                        <button onclick="addFriendToGroup()">Add Member</button>
                    </div>
                </header>

                <div id="chat-window">
                    </div>

                <div class="chat-input-bar">
                    <input type="text" id="message-input" placeholder="Type a message...">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        // FIXED: Capitalized "Supabase.createClient" on line 91 below
        const SUPABASE_URL = "https://ymyufknfzseedkkqoprt.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_6sADHUhmDUd3y0ScQdp0IQ_M7VbJ-8p";
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let myUsername = localStorage.getItem("chat_username");
        let currentRoomId = null;
        let currentRoomName = null;
        let currentAllowedUsers = [];

        window.onload = function() {
            if (myUsername) {
                initApp();
            } else {
                document.getElementById("auth-screen").classList.remove("hidden");
            }
        };

        function initApp() {
            document.getElementById("auth-screen").classList.add("hidden");
            document.getElementById("app-screen").classList.remove("hidden");
            document.getElementById("display-my-username").innerText = `@${myUsername}`;
            showHomeView();
            listenToGlobalRealtime();
        }

        function showHomeView() {
            currentRoomId = null;
            document.getElementById("chat-view").classList.add("hidden");
            document.getElementById("home-view").classList.remove("hidden");
            loadMyRooms();
        }

        // --- AUTH ENGINE ---
        async function registerUsername() {
            const input = document.getElementById("username-input");
            const errorText = document.getElementById("auth-error");
            const username = input.value.trim().toLowerCase();

            if (!username) return alert("Username cannot be empty.");
            errorText.innerText = "Checking availability...";

            const { data, error } = await supabase.from('usernames').select('username').eq('username', username);
            if (error) return errorText.innerText = "Database connection error.";

            if (data.length > 0) {
                errorText.innerText = "⚠️ That username is taken!";
            } else {
                const { error: insertError } = await supabase.from('usernames').insert([{ username: username }]);
                if (insertError) return errorText.innerText = "Registration failed.";

                localStorage.setItem("chat_username", username);
                myUsername = username;
                initApp();
            }
        }

        // --- GROUP LOGIC ---
        async function createNewGroup() {
            const roomInput = document.getElementById("new-room-name");
            const errorText = document.getElementById("group-error");
            const roomName = roomInput.value.trim();

            if (!roomName) return alert("Enter a group name.");

            const { error } = await supabase
                .from('group_chats')
                .insert([{ room_name: roomName, allowed_users: [myUsername] }]);

            if (error) {
                errorText.innerText = "Group name already exists.";
            } else {
                roomInput.value = "";
                errorText.innerText = "";
                loadMyRooms();
            }
        }

        async function loadMyRooms() {
            const { data, error } = await supabase
                .from('group_chats')
                .select('*')
                .contains('allowed_users', [myUsername]);

            if (error) return;

            const list = document.getElementById("rooms-list");
            list.innerHTML = "";

            data.forEach(room => {
                const card = document.createElement("li");
                card.className = "room-card";
                card.innerHTML = `
                    <h3>💬 ${room.room_name}</h3>
                    <p>${room.allowed_users.length} members</p>
                `;
                card.onclick = () => openChatRoom(room);
                list.appendChild(card);
            });
        }

        function openChatRoom(room) {
            currentRoomId = room.id;
            currentRoomName = room.room_name;
            currentAllowedUsers = room.allowed_users;

            document.getElementById("home-view").classList.add("hidden");
            document.getElementById("chat-view").classList.remove("hidden");
            document.getElementById("active-room-header").innerText = `# ${room.room_name}`;
            
            const win = document.getElementById("chat-window");
            win.innerHTML = `<p class="system-msg">Secure chat history initialized for ${room.room_name}.</p>`;
        }

        // --- ADD PEOPLE INNER BUTTON ---
        async function addFriendToGroup() {
            const input = document.getElementById("invite-username");
            const friendName = input.value.trim().toLowerCase();

            if (!friendName) return alert("Type a username to add.");
            if (currentAllowedUsers.includes(friendName)) return alert("User is already in this group!");

            // Check if friend actually exists
            const { data, error } = await supabase.from('usernames').select('username').eq('username', friendName);
            if (error || data.length === 0) return alert("User does not exist. Tell them to sign up first!");

            // Append user to database array list
            const updatedUsers = [...currentAllowedUsers, friendName];

            const { error: updateError } = await supabase
                .from('group_chats')
                .update({ allowed_users: updatedUsers })
                .eq('id', currentRoomId);

            if (updateError) {
                alert("Failed to add member.");
            } else {
                currentAllowedUsers = updatedUsers;
                input.value = "";
                alert(`Added @${friendName} successfully!`);
            }
        }

        function listenToGlobalRealtime() {
            supabase
                .channel('schema-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'group_chats' }, () => {
                    if (currentRoomId === null) {
                        loadMyRooms();
                    }
                })
                .subscribe();
        }

        function sendMessage() {
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (!text) return;

            const win = document.getElementById("chat-window");
            const msgDiv = document.createElement("div");
            msgDiv.className = "msg-row current-user-msg";
            msgDiv.innerHTML = `<div class="msg-bubble"><span class="msg-author">You</span><p>${text}</p></div>`;
            win.appendChild(msgDiv);
            win.scrollTop = win.scrollHeight;
            input.value = "";
        }
    </script>
</body>
</html>
