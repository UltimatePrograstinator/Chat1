<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chatroom</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.11.0.2.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h2>🔒 Private Rooms</h2>
            <p>Secure, real-time messaging powered by PubNub.</p>
        </header>
        
        <section class="card">
            <h3>1. Setup Your Secret Room</h3>
            <div class="input-group">
                <input type="text" id="room-input" placeholder="e.g., secret-lounge-77">
                <button onclick="connectToRoom()">Connect</button>
            </div>
            <div class="status-wrapper">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Not connected to any room</span>
            </div>
        </section>

        <section class="card chat-card">
            <h3>2. Live Conversation</h3>
            <div id="chat-window">
                <p class="system-msg">Enter a secret room name above to start chatting securely.</p>
            </div>
            <div class="input-group chat-controls">
                <input type="text" id="username" placeholder="Your Alias" maxlength="12">
                <input type="text" id="message" placeholder="Type a message..." disabled>
                <button id="send-btn" onclick="sendChat()" disabled>Send</button>
            </div>
        </section>
    </div>

    <script>
        let pubnub = null;
        let currentChannel = null;

        function connectToRoom() {
            const roomName = document.getElementById("room-input").value.trim();
            if (!roomName) return alert("Please type a room name first!");

            // If already connected to a room, drop subscription first
            if (pubnub && currentChannel) {
                pubnub.unsubscribe({ channels: [currentChannel] });
            }

            currentChannel = roomName;

            // Initialize PubNub client with your unique keys
            pubnub = new PubNub({
                publishKey: "pub-c-d1e10604-b39e-442e-891d-789b3b6c6bf6", 
                subscribeKey: "sub-c-a82f38b7-b8b1-4226-9bd4-abae3e698854",
                userId: "user_" + Math.random().toString(36).substring(2, 9)
            });

            // Set up event framework for message ingestion
            pubnub.addListener({
                message: function(event) {
                    const chatWindow = document.getElementById("chat-window");
                    const msgDiv = document.createElement("div");
                    msgDiv.classList.add("msg-bubble");
                    
                    msgDiv.innerHTML = `<span class="msg-author">${event.message.name}</span><p class="msg-text">${event.message.text}</p>`;
                    chatWindow.appendChild(msgDiv);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
            });

            // Open stream channel
            pubnub.subscribe({
                channels: [currentChannel]
            });

            // Update user interface status hooks
            document.getElementById("status-text").innerText = `Connected to room: ${currentChannel}`;
            document.getElementById("status-dot").classList.add("online");
            document.getElementById("message").disabled = false;
            document.getElementById("send-btn").disabled = false;
            
            const chatWindow = document.getElementById("chat-window");
            chatWindow.innerHTML = `<p class="system-msg yellow">Switched to channel: "${currentChannel}". Give this exact name to your friend to join!</p>`;
        }

        function sendChat() {
            const nameInput = document.getElementById("username");
            const msgInput = document.getElementById("message");

            const name = nameInput.value.trim() || "Anonymous";
            const text = msgInput.value.trim();

            if (text !== "" && pubnub && currentChannel) {
                pubnub.publish({
                    channel: currentChannel,
                    message: { name: name, text: text }
                });
                msgInput.value = "";
            }
        }

        // Send message on Enter key press
        document.getElementById("message").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendChat();
            }
        });
    </script>
</body>
</html>
